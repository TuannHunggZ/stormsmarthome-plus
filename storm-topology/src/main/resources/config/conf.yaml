# Shared Storm configuration.
# Add new sections here for other spouts or bolts as the topology grows.

# Time slices, in minutes, used by punctuation generation across the topology.
timeslices:
  - 1
  - 5
  - 10
  - 15
  - 20
  - 30
  - 60
  - 120

spout-data:
  # MQTT broker URI that the spout connects to.
  broker-uri: "tcp://mqtt-broker:1883"

  # MQTT topic consumed by the spout.
  broker-topic: "iot-data"

  # MQTT subscription QoS used by the spout.
  qos: 0

  # Maximum number of stream events emitted by one nextTuple() call.
  max-emit-per-next-tuple: 100

  # Maximum number of stream events buffered before new messages are dropped.
  queue-capacity: 10000

  # Storm stream id used for data tuples.
  stream-id-data: "data"

  # MQTT property value that identifies a load event.
  property-load: 1

  # MQTT connection timeout in seconds.
  connection-timeout-seconds: 10

  # Output field name for the event id.
  field-id: "id"

  # Output field name for the event timestamp.
  field-timestamp: "timestamp"

  # Output field name for the event value.
  field-value: "value"

  # Output field name for the plug identifier.
  field-plug-id: "plugId"

  # Output field name for the household identifier.
  field-household-id: "householdId"

  # Output field name for the house identifier.
  field-house-id: "houseId"

  # Output field name for the punctuation window size.
  field-window-size: "windowSize"

  # Output field name for the punctuation slice index.
  field-slice-index: "sliceIndex"

bolt-average:
  # Input stream carrying live load events.
  input-stream-data: "data"

  # Input field name for the event value.
  input-field-value: "value"

  # Input field name for the plug identifier.
  input-field-plug-id: "plugId"

  # Input field name for the household identifier.
  input-field-household-id: "householdId"

  # Input field name for the house identifier.
  input-field-house-id: "houseId"

  # Input field name for the punctuation window size.
  input-field-window-size: "windowSize"

  # Input field name for the punctuation slice index.
  input-field-slice-index: "sliceIndex"

  # Output stream for current plug averages.
  output-plug-stream-id: "current-plug-average"

  # Output stream for current house averages.
  output-house-stream-id: "current-house-average"

  # Output field name for the punctuation window size.
  output-field-window-size: "windowSize"

  # Output field name for the punctuation slice index.
  output-field-slice-index: "sliceIndex"

  # Output field name for the house identifier.
  output-field-house-id: "houseId"

  # Output field name for the household identifier.
  output-field-household-id: "householdId"

  # Output field name for the plug identifier.
  output-field-plug-id: "plugId"

  # Output field name for the current average value.
  output-field-current-average: "currentAverage"

bolt-average-persistence:
  # Input stream carrying current plug averages.
  input-plug-stream-id: "current-plug-average"

  # Input stream carrying current house averages.
  input-house-stream-id: "current-house-average"

  # JDBC URL for PostgreSQL.
  jdbc-url: "jdbc:postgresql://postgres:5432/iotdata"

  # PostgreSQL username.
  jdbc-user: "postgres"

  # PostgreSQL password.
  jdbc-password: "postgres"

  # Number of records to buffer before flushing a batch.
  batch-size: 1000

  # Target table for plug averages.
  plug-table-name: "plug_average"

  # Target table for house averages.
  house-table-name: "house_average"

  # SQL template for plug inserts.
  plug-insert-sql: "INSERT INTO %s (window_size, slice_index, house_id, household_id, plug_id, average_load) VALUES (?, ?, ?, ?, ?, ?) ON CONFLICT DO NOTHING"

  # SQL template for house inserts.
  house-insert-sql: "INSERT INTO %s (window_size, slice_index, house_id, average_load) VALUES (?, ?, ?, ?) ON CONFLICT DO NOTHING"

bolt-plug-median:
  # Input field name for the punctuation window size.
  input-field-window-size: "windowSize"

  # Input field name for the punctuation slice index.
  input-field-slice-index: "sliceIndex"

  # JDBC URL for PostgreSQL.
  jdbc-url: "jdbc:postgresql://postgres:5432/iotdata"

  # PostgreSQL username.
  jdbc-user: "postgres"

  # PostgreSQL password.
  jdbc-password: "postgres"

  # SQL template used to query historical plug averages.
  select-sql-template: "SELECT house_id, household_id, plug_id, average_load FROM %s WHERE window_size = ? AND slice_index = ?"

  # Prefix of punctuation stream ids consumed by this bolt.
  input-stream-id-prefix: "punctuation-"

  # Output stream carrying archived plug medians.
  output-stream-id: "archive-plug-median"

  # Output field name for the window size.
  output-field-window-size: "windowSize"

  # Output field name for the slice index.
  output-field-slice-index: "sliceIndex"

  # Output field name for the house identifier.
  output-field-house-id: "houseId"

  # Output field name for the household identifier.
  output-field-household-id: "householdId"

  # Output field name for the plug identifier.
  output-field-plug-id: "plugId"

  # Output field name for the archive median.
  output-field-archive-median: "archiveMedian"

  # Lower bound of the dataset in unix timestamp seconds.
  minimum-dataset-timestamp-seconds: 1377986401

bolt-house-median:
  # Input field name for the punctuation window size.
  input-field-window-size: "windowSize"

  # Input field name for the punctuation slice index.
  input-field-slice-index: "sliceIndex"

  # JDBC URL for PostgreSQL.
  jdbc-url: "jdbc:postgresql://postgres:5432/iotdata"

  # PostgreSQL username.
  jdbc-user: "postgres"

  # PostgreSQL password.
  jdbc-password: "postgres"

  # SQL template used to query historical house averages.
  select-sql-template: "SELECT house_id, average_load FROM %s WHERE window_size = ? AND slice_index = ?"

  # Prefix of punctuation stream ids consumed by this bolt.
  input-stream-id-prefix: "punctuation-"

  # Output stream carrying archived house medians.
  output-stream-id: "archive-house-median"

  # Output field name for the window size.
  output-field-window-size: "windowSize"

  # Output field name for the slice index.
  output-field-slice-index: "sliceIndex"

  # Output field name for the house identifier.
  output-field-house-id: "houseId"

  # Output field name for the archive median.
  output-field-archive-median: "archiveMedian"

  # Lower bound of the dataset in unix timestamp seconds.
  minimum-dataset-timestamp-seconds: 1377986401

bolt-plug-forecast:
  # Input stream id for plug average tuples.
  input-average-stream-id: "current-plug-average"

  # Input stream id for archive median tuples.
  input-median-stream-id: "archive-plug-median"

  # Input field name for the punctuation window size.
  input-field-window-size: "windowSize"

  # Input field name for the punctuation slice index.
  input-field-slice-index: "sliceIndex"

  # Input field name for the house identifier.
  input-field-house-id: "houseId"

  # Input field name for the household identifier.
  input-field-household-id: "householdId"

  # Input field name for the plug identifier.
  input-field-plug-id: "plugId"

  # Input field name for the current average value.
  input-field-current-average: "currentAverage"

  # Input field name for the archive median value.
  input-field-archive-median: "archiveMedian"

  # Lower bound of the dataset in unix timestamp seconds.
  minimum-dataset-timestamp-seconds: 1377986401

bolt-house-forecast:
  # Input stream id for house average tuples.
  input-average-stream-id: "current-house-average"

  # Input stream id for archive median tuples.
  input-median-stream-id: "archive-house-median"

  # Input field name for the punctuation window size.
  input-field-window-size: "windowSize"

  # Input field name for the punctuation slice index.
  input-field-slice-index: "sliceIndex"

  # Input field name for the house identifier.
  input-field-house-id: "houseId"

  # Input field name for the current average value.
  input-field-current-average: "currentAverage"

  # Input field name for the archive median value.
  input-field-archive-median: "archiveMedian"

  # Lower bound of the dataset in unix timestamp seconds.
  minimum-dataset-timestamp-seconds: 1377986401
